name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        run: bash scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 "Gander-v${{ steps.version.outputs.version }}.zip" | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Gander-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Update Cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          sed -i '' "s/  version \".*\"/  version \"${VERSION}\"/" Casks/gander.rb
          sed -i '' "s/  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/gander.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gander.rb
          git commit -m "Update Cask to v${VERSION}"
          git push origin HEAD:main
