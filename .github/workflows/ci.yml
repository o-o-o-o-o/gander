name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Casks/**'

jobs:
  build-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift build
        run: swift build

      - name: Logic tests
        run: bash logic-test.sh
